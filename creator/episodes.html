<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการตอน - Luminous Story</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Mali', 'sans-serif'], reading: ['Sarabun', 'sans-serif'] },
                    colors: { primary: { light: '#6ee7b7', DEFAULT: '#10b981', dark: '#047857' } }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-emerald-50 text-gray-800 leading-loose flex flex-col min-h-screen">

    <div id="navbar-container"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-5xl">
        <div class="mb-6">
            <a href="works.html" class="inline-flex items-center text-gray-500 hover:text-primary transition-colors font-medium mb-4">
                <i class="fa-solid fa-arrow-left mr-2"></i> กลับไปหน้าจัดการผลงาน
            </a>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b-2 border-emerald-100 pb-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                        <i class="fa-solid fa-list-ol text-primary fa-bounce" style="--fa-animation-iteration-count: 2;"></i> จัดการตอน (Episodes)
                    </h1>
                    <p class="text-gray-500 mt-1" id="work-title-display">กำลังโหลดชื่อเรื่อง...</p>
                </div>
                <button id="open-episode-modal-btn" class="mt-4 md:mt-0 bg-primary text-white font-bold px-6 py-2 rounded-full shadow-lg hover:bg-primary-dark transition-colors flex items-center gap-2 transform hover:scale-105">
                    <i class="fa-solid fa-plus"></i> เพิ่มตอนใหม่
                </button>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-emerald-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-emerald-50 text-emerald-800 border-b border-emerald-100">
                            <th class="py-4 px-6 font-bold whitespace-nowrap">ตอนที่</th>
                            <th class="py-4 px-6 font-bold">ชื่อตอนและข้อมูลวิดีโอ</th>
                            <th class="py-4 px-6 font-bold text-center">สถานะ</th>
                            <th class="py-4 px-6 font-bold text-center">ราคา</th>
                            <th class="py-4 px-6 font-bold text-right">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="episodes-list">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="episode-modal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-3xl max-h-[95vh] overflow-y-auto transform transition-all border border-emerald-100 flex flex-col">
            <div class="sticky top-0 bg-white px-6 py-4 border-b border-emerald-50 flex justify-between items-center z-10 shrink-0">
                <h2 class="text-2xl font-bold text-gray-800" id="modal-title"><i class="fa-solid fa-file-video text-primary"></i> ข้อมูลตอน</h2>
                <button id="close-episode-modal-btn" class="text-gray-400 hover:text-red-500 transition-colors text-2xl focus:outline-none">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <form id="episode-form" class="p-6 space-y-5 flex-grow">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <div class="md:col-span-1">
                        <label class="block text-sm font-bold text-gray-700 mb-2">ตอนที่ <span class="text-red-500">*</span></label>
                        <input type="number" id="ep-number" required min="1" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none text-center bg-gray-50">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-sm font-bold text-gray-700 mb-2">ชื่อตอน <span class="text-red-500">*</span></label>
                        <input type="text" id="ep-title" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="เช่น การพบกันครั้งแรก">
                    </div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fa-brands fa-youtube text-red-500"></i> YouTube URL (แบบ Unlisted) <span class="text-red-500">*</span></label>
                        <input type="url" id="ep-video-url" required class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="https://youtu.be/...">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fa-regular fa-clock"></i> ความยาว (วินาที) <span class="text-red-500">*</span></label>
                            <input type="number" id="ep-duration" required min="1" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="เช่น 180">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fa-solid fa-play"></i> เริ่มดูฟรี (วินาทีที่) <span class="text-red-500">*</span></label>
                            <input type="number" id="ep-hook-start" required min="0" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="เช่น 0">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fa-solid fa-stop"></i> สิ้นสุดดูฟรี (วินาทีที่) <span class="text-red-500">*</span></label>
                            <input type="number" id="ep-hook-end" required min="0" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary outline-none" placeholder="เช่น 10">
                        </div>
                    </div>
		</div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-bold text-yellow-800"><i class="fa-solid fa-key"></i> การตั้งราคา (กุญแจ) <span class="text-red-500">*</span></label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="ep-is-free" class="w-4 h-4 text-primary focus:ring-primary rounded">
                            <span class="font-bold text-emerald-600 text-xs">เปิดให้ดูฟรี 100%</span>
                        </label>
                    </div>
                    <div class="relative">
                        <input type="number" id="ep-price" required min="0" class="w-full px-4 py-3 border border-yellow-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none bg-white font-bold text-gray-700 pl-10" placeholder="ระบุจำนวน Keys">
                        <i class="fa-solid fa-key absolute left-3 top-1/2 transform -translate-y-1/2 text-yellow-500"></i>
                    </div>
                    <p class="text-xs text-yellow-700 mt-2">
                        💡 <b>แนะนำ:</b> ต่ำกว่า 1 นาที (1-3 Keys), 1-3 นาที (3-7 Keys)<br>
                        *ตอนพีค/พิเศษ บวกเพิ่มได้ 1-5 Keys
                    </p>
                </div>

                    <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                        <label class="block text-sm font-bold text-emerald-800 mb-2"><i class="fa-solid fa-globe"></i> สถานะการเผยแพร่</label>
                        <div class="flex items-center gap-4 mt-2">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="ep-publish" value="true" checked class="w-5 h-5 text-primary focus:ring-primary">
                                <span class="font-bold text-gray-700 text-sm">เผยแพร่ทันที</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="ep-publish" value="false" class="w-5 h-5 text-primary focus:ring-primary">
                                <span class="font-bold text-gray-700 text-sm">แบบร่าง (Draft)</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-emerald-50 text-right flex justify-end gap-3 shrink-0">
                    <button type="button" id="cancel-episode-modal-btn" class="px-6 py-3 font-bold text-gray-500 hover:bg-gray-100 rounded-xl transition-colors">ยกเลิก</button>
                    <button type="submit" class="px-6 py-3 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-primary-dark transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-save"></i> บันทึกข้อมูล
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="footer-container"></div>

    <script type="module" src="../js/app.js"></script>
    <script type="module">
        import { initManageEpisodes } from '../js/creator/manageEpisodes.js';
        document.addEventListener('DOMContentLoaded', () => {
            initManageEpisodes();
        });
    </script>
</body>
</html>
