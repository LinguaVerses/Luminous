<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อ่านนิยาย - Luminous Story</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // เปิดใช้งาน Dark Mode แบบใช้ Class
            theme: {
                extend: {
                    fontFamily: { sans: ['Mali', 'sans-serif'], reading: ['Sarabun', 'sans-serif'] },
                    colors: { primary: { light: '#6ee7b7', DEFAULT: '#10b981', dark: '#047857' } }
                }
            }
        }
    </script>
    <style>
        /* จัดรูปแบบเนื้อหานิยาย */
        #reading-content p {
            text-indent: 2em;
            margin-bottom: 1.5em;
            line-height: 1.8;
        }
        /* สมูททรานซิชันสำหรับ Dark Mode */
        body { transition: background-color 0.3s, color 0.3s; }

	/* Video Modal Styles */
        .video-thumbnail { position: relative; cursor: pointer; border-radius: 1rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: transform 0.3s; }
        .video-thumbnail:hover { transform: scale(1.02); }
        .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(16, 185, 129, 0.9); color: white; font-size: 2rem; width: 4rem; height: 4rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4); transition: background 0.3s; z-index: 10; }
        .video-thumbnail:hover .play-button { background: #059669; }
        #videoModal { backdrop-filter: blur(4px); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 0.5rem; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>

<body class="font-sans bg-emerald-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen flex flex-col transition-colors duration-300" id="reader-body">

    <nav class="bg-white dark:bg-gray-800 border-b border-emerald-100 dark:border-gray-700 sticky top-0 z-50 transition-colors duration-300 shadow-sm" id="read-nav">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="#" id="back-btn" class="text-gray-500 hover:text-primary transition-colors flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> <span class="hidden md:inline">กลับหน้ารายละเอียด</span>
            </a>
            
            <div class="text-center truncate px-4 flex-grow">
                <h1 class="font-bold text-gray-800 dark:text-gray-200 truncate text-sm md:text-base" id="nav-work-title">กำลังโหลด...</h1>
                <p class="text-xs text-primary dark:text-emerald-400 font-medium truncate" id="nav-ep-title"></p>
            </div>

            <div class="flex items-center gap-3 md:gap-4">
                <button id="btn-font-decrease" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-emerald-400 w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="ลดขนาดอักษร"><i class="fa-solid fa-a text-sm"></i></button>
                <button id="btn-font-increase" class="text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-emerald-400 w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="เพิ่มขนาดอักษร"><i class="fa-solid fa-a text-lg"></i></button>
                <div class="w-px h-6 bg-gray-200 dark:bg-gray-700"></div>
                <button id="btn-theme-toggle" class="text-gray-500 dark:text-gray-400 hover:text-yellow-500 w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="โหมดกลางคืน"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-3xl flex flex-col relative">
        
        <div id="loading-spinner" class="text-center py-20 text-gray-500 dark:text-gray-400">
            <i class="fa-solid fa-spinner fa-spin text-4xl text-primary mb-4"></i><br>กำลังโหลดเนื้อหา...
        </div>

        <div id="content-container" class="hidden flex-grow">
            <h2 class="text-2xl md:text-3xl font-bold mb-8 text-center text-primary dark:text-emerald-400" id="ep-title-display"></h2>
            
            <div id="reading-content" class="font-reading text-lg text-gray-800 dark:text-gray-200 mb-12">
                </div>
        </div>

        <div id="lock-screen" class="hidden absolute inset-x-0 top-32 bottom-0 bg-white/60 backdrop-blur-md z-10 flex flex-col items-center justify-start pt-20 px-4 rounded-3xl">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-yellow-200 text-center max-w-md w-full relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-yellow-400 to-yellow-500"></div>
                <i class="fa-solid fa-lock text-5xl text-yellow-500 mb-4 fa-bounce"></i>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">ตอนนี้ถูกล็อก</h3>
                <p class="text-gray-500 text-sm mb-6">คุณต้องใช้กุญแจเพื่อปลดล็อกและสนับสนุนนักเขียน</p>
                
                <div class="space-y-3">
                    <button id="btn-unlock-single" class="w-full py-3 bg-primary text-white font-bold rounded-xl shadow hover:bg-primary-dark transition-transform hover:scale-105 flex justify-center items-center gap-2">
                        <i class="fa-solid fa-key"></i> ปลดล็อกตอนนี้ (<span id="single-price">0</span> กุญแจ)
                    </button>
                    
                    <button id="btn-unlock-bundle" class="w-full py-3 bg-gradient-to-r from-yellow-400 to-yellow-500 text-yellow-900 font-black rounded-xl shadow-lg hover:shadow-xl transition-transform hover:scale-105 flex justify-center items-center gap-2 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-white/20 transform -skew-x-12 -translate-x-full group-hover:animate-[shine_1.5s_ease-in-out]"></div>
                        <i class="fa-solid fa-unlock-keyhole"></i> Unlock Next 5 Episodes
                        <span class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-1 animate-pulse">Save 10%</span>
                    </button>
                </div>
            </div>
        </div>

    	<div id="videoModal" class="hidden fixed inset-0 z-[100] bg-black/80 flex justify-center items-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-gray-900 w-full max-w-4xl rounded-2xl shadow-2xl relative transform scale-95 transition-transform duration-300" id="videoModalContent">
                <button onclick="window.closeVideoModal()" class="absolute -top-12 right-0 md:-right-10 text-white hover:text-emerald-400 text-3xl transition-colors z-50 focus:outline-none"><i class="fa-solid fa-xmark"></i></button>
                <div class="video-container shadow-inner">
                    <iframe id="youtubePlayer" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>

	<div id="episode-navigation" class="hidden grid grid-cols-2 gap-4 mt-auto pt-8 border-t border-gray-200">
            <button id="btn-prev-ep" class="px-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-600 font-bold hover:bg-emerald-50 hover:text-primary hover:border-emerald-200 transition-all flex items-center justify-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                <i class="fa-solid fa-chevron-left"></i> ตอนก่อนหน้า
            </button>
            <button id="btn-next-ep" class="px-4 py-3 bg-primary text-white rounded-xl font-bold hover:bg-primary-dark transition-all flex items-center justify-center gap-2 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">
                ตอนถัดไป <i class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="comments-section" class="mt-12 pt-8 border-t border-emerald-100 hidden">
            <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2"><i class="fa-solid fa-comments text-primary"></i> ความคิดเห็น (<span id="comment-count">0</span>)</h3>
            
            <div class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-emerald-100 mb-8 transition-colors dark:bg-gray-800 dark:border-gray-700">
                <div class="flex gap-3 md:gap-4">
                    <img src="https://via.placeholder.com/40" id="current-user-avatar" class="w-10 h-10 rounded-full object-cover shrink-0 border border-gray-200">
                    <div class="flex-grow">
                        <textarea id="comment-input" class="w-full bg-emerald-50/50 dark:bg-gray-700 border border-emerald-100 dark:border-gray-600 rounded-2xl p-4 focus:ring-2 focus:ring-primary focus:border-primary outline-none resize-none font-sans text-sm transition-colors text-gray-800 dark:text-gray-200" rows="3" placeholder="แสดงความคิดเห็นเกี่ยวกับตอนนี้..."></textarea>
                        <div class="text-right mt-3">
                            <button id="btn-submit-comment" class="px-6 py-2 bg-primary text-white font-bold rounded-full shadow-md hover:bg-primary-dark transition-transform hover:scale-105"><i class="fa-solid fa-paper-plane"></i> ส่งข้อความ</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="comments-list" class="space-y-6">
                <div class="text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-primary"></i><br>กำลังโหลดความคิดเห็น...</div>
            </div>
        </div>        

    </main>

    <script type="module" src="./js/app.js"></script>
    <script type="module">
        import { initReader } from './js/pages/read.js';
        document.addEventListener('DOMContentLoaded', () => {
            initReader();
        });
    </script>
</body>
</html>
