<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังผลงานทั้งหมด - Luminous Story</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Mali', 'sans-serif'], reading: ['Sarabun', 'sans-serif'] },
                    colors: { primary: { light: '#6ee7b7', DEFAULT: '#10b981', dark: '#047857' } }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-emerald-50 text-gray-800 leading-loose flex flex-col min-h-screen">
    <div id="navbar-container"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b-2 border-emerald-100 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-3">
                    <i class="fa-solid fa-layer-group text-primary fa-bounce" style="--fa-animation-iteration-count: 2;"></i> คลังผลงานทั้งหมด
                </h1>
                <p class="text-gray-500 mt-1">ค้นพบ Animation และ Shot Animation ที่คุณชื่นชอบ</p>
            </div>
            <div class="flex bg-white rounded-full shadow-sm border border-emerald-100 p-1 mt-4 md:mt-0">
                <button id="filter-all" class="px-6 py-2 rounded-full font-bold text-sm bg-primary text-white transition-colors">ทั้งหมด</button>
                <button id="filter-animation" class="px-6 py-2 rounded-full font-bold text-sm text-gray-500 hover:text-primary transition-colors">Animation</button>
            <button id="filter-shot-animation" class="px-6 py-2 rounded-full font-bold text-sm text-gray-500 hover:text-primary transition-colors">Shot Animation</button>
            </div>
        </div>

    <div class="bg-white p-4 rounded-3xl shadow-sm border border-emerald-100 mb-8 flex flex-col md:flex-row gap-4 items-center z-10 relative">
            <div class="relative w-full md:flex-1">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-emerald-400 fa-beat-fade" style="--fa-animation-duration: 3s;"></i>
                </div>
                <input type="text" id="search-input" class="w-full pl-11 pr-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-gray-400" placeholder="ค้นหาชื่อเรื่อง Animation หรือ Shot Animation...">
            </div>
            
            <div class="flex flex-wrap w-full md:w-auto gap-3">
                <select id="filter-status" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm font-medium text-gray-700 focus:ring-2 focus:ring-primary outline-none cursor-pointer">
                    <option value="all">สถานะทั้งหมด</option>
                    <option value="Ongoing">Ongoing (กำลังแต่ง)</option>
                    <option value="Complete">Complete (จบแล้ว)</option>
                    <option value="Coming Soon">Coming Soon (เร็วๆ นี้)</option>
                    <option value="Hiatus">Hiatus (หยุดพัก)</option>
                </select>
                
                <select id="filter-main-genre" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm font-medium text-gray-700 focus:ring-2 focus:ring-primary outline-none cursor-pointer">
                    <option value="all">หมวดหมู่หลัก</option>
                    <option value="Action">Action (แอ็กชัน)</option>
                    <option value="Adventure">Adventure (ผจญภัย)</option>
                    <option value="Comedy">Comedy (ตลก)</option>
                    <option value="Fantasy">Fantasy (แฟนตาซี)</option>
                    <option value="Sci-Fi">Sci-Fi (ไซไฟ)</option>
                    <option value="Romance">Romance (โรแมนติก)</option>
                    <option value="Drama">Drama (ดราม่า)</option>
                    <option value="Horror">Horror (สยองขวัญ)</option>
                    <option value="Mystery">Mystery (สืบสวน)</option>
                    <option value="Slice of Life">Slice of Life (ชีวิตประจำวัน)</option>
                    <option value="Family / Kids">Family / Kids (เด็ก / ครอบครัว)</option>
                    <option value="Educational">Educational (ความรู้ / สาระ)</option>
                </select>

                <select id="filter-tone" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm font-medium text-gray-700 focus:ring-2 focus:ring-primary outline-none cursor-pointer">
                    <option value="all">โทนเรื่อง</option>
                    <option value="Cute">Cute / น่ารัก</option>
                    <option value="Dark">Dark / ดาร์ก</option>
                    <option value="Emotional">Emotional / ซึ้ง</option>
                    <option value="Lighthearted">Lighthearted / เบาสมอง</option>
                </select>

                <select id="filter-theme" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm font-medium text-gray-700 focus:ring-2 focus:ring-primary outline-none cursor-pointer">
                    <option value="all">ธีมเนื้อหา</option>
                    <option value="Animal">Animal (สัตว์)</option>
                    <option value="Magic">Magic (เวทมนตร์)</option>
                    <option value="Supernatural">Supernatural (เหนือธรรมชาติ)</option>
                    <option value="School">School (โรงเรียน)</option>
                    <option value="Friendship">Friendship (มิตรภาพ)</option>
                    <option value="Adventure Quest">Adventure Quest (ภารกิจ)</option>
                </select>

                <select id="filter-audience" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm font-medium text-gray-700 focus:ring-2 focus:ring-primary outline-none cursor-pointer">
                    <option value="all">กลุ่มผู้ชม</option>
                    <option value="Kids">Kids</option>
                    <option value="Teen">Teen</option>
                    <option value="Adult">Adult</option>
                </select>

                <select id="filter-style" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-50/50 border border-emerald-100 rounded-full text-sm font-medium text-gray-700 focus:ring-2 focus:ring-primary outline-none cursor-pointer">
                    <option value="all">สไตล์</option>
                    <option value="Anime Style">Anime Style</option>
                    <option value="Western Cartoon">Western Cartoon</option>
                    <option value="3D Animation">3D Animation</option>
                    <option value="2D Animation">2D Animation</option>
                </select>
            </div>
        </div>

        <div id="works-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 mb-10 min-h-[400px]">
            <div class="col-span-full text-center py-20 text-gray-500">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-primary mb-4"></i><br>
                กำลังโหลดผลงาน...
            </div>
        </div>

        <div id="pagination-container" class="flex justify-center items-center gap-2 mt-8 pb-8">
            </div>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="./js/app.js"></script>
    <script type="module">
        import { initWorks } from './js/pages/works.js';
        document.addEventListener('DOMContentLoaded', () => {
            initWorks();
        });
    </script>
</body>
</html>
