<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Luminous Story</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Mali', 'sans-serif'], reading: ['Sarabun', 'sans-serif'] },
                    colors: { primary: { light: '#6ee7b7', DEFAULT: '#10b981', dark: '#047857' } }
                }
            }
        }
    </script>
</head>
<body class="font-sans bg-emerald-50 text-gray-800 min-h-screen flex flex-col">

    <div id="navbar-container"></div>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="bg-white p-8 md:p-10 rounded-3xl shadow-lg border border-emerald-100 w-full max-w-lg relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-48 h-48 bg-emerald-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

            <div class="text-center mb-8 relative z-10">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-100 text-primary text-3xl mb-4 shadow-sm">
                    <i class="fa-solid fa-user-plus fa-bounce" style="--fa-animation-iteration-count: 2;"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">สร้างบัญชีใหม่</h1>
                <p class="text-gray-500 text-sm">🎁 พิเศษ! สมัครวันนี้รับฟรี <span class="text-yellow-500 font-bold">30 กุญแจ</span> ทันที</p>
            </div>

            <form id="register-form" class="space-y-5 relative z-10">              
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ชื่อผู้ใช้งาน (Username) <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-user"></i></div>
                        <input type="text" id="reg-username" required class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="นามแฝงของคุณ">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">อีเมล <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-envelope"></i></div>
                        <input type="email" id="reg-email" required class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="your@email.com">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">รหัสผ่าน <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-lock"></i></div>
                        <input type="password" id="reg-password" required minlength="6" class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="อย่างน้อย 6 ตัวอักษร">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">ยืนยันรหัสผ่าน <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400"><i class="fa-solid fa-check-double"></i></div>
                        <input type="password" id="reg-confirm-password" required minlength="6" class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="กรอกรหัสผ่านอีกครั้ง">
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-primary-dark transition-transform hover:scale-[1.02] flex items-center justify-center gap-2 mt-4">
                    <i class="fa-solid fa-right-to-bracket"></i> สมัครสมาชิกเลย!
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6 relative z-10">
                มีบัญชีอยู่แล้วใช่ไหม? <a href="login.html" class="text-primary font-bold hover:underline">เข้าสู่ระบบ</a>
            </p>
        </div>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="./js/app.js"></script>
    <script type="module" src="./js/pages/register.js"></script>
    <script type="module" src="./js/components/navbar.js"></script>
    <script type="module">
        import { loadNavbar } from './js/components/navbar.js';
        document.addEventListener('DOMContentLoaded', loadNavbar);
    </script>
</body>
</html>
