<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักเขียน | Luminous Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#10b981', 'primary-dark': '#059669' },
                    fontFamily: { sans: ['Prompt', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <div id="navbar-container"></div>

    <main class="flex-grow">
        <div id="loading-spinner" class="flex flex-col items-center justify-center py-32 text-primary">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl mb-4"></i>
            <p class="font-bold text-gray-500 animate-pulse">กำลังโหลดข้อมูลนักเขียน...</p>
        </div>

        <div id="profile-content" class="hidden pb-12">
            
            <div class="bg-white border-b border-emerald-50 mb-8 relative shadow-sm">
                <div class="h-48 md:h-64 bg-gradient-to-r from-emerald-500 via-teal-400 to-emerald-300 relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-20"></div>
                </div>

                <div class="container mx-auto px-4 max-w-6xl relative -mt-16 sm:-mt-20 flex flex-col sm:flex-row items-center sm:items-end gap-6 pb-6">
                    <div class="relative shrink-0 z-10">
                        <img id="creator-avatar" src="https://via.placeholder.com/150" alt="Creator Avatar" class="w-32 h-32 sm:w-40 sm:h-40 rounded-full border-4 border-white shadow-lg object-cover bg-white">
                        <div class="absolute bottom-2 right-2 bg-yellow-400 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-md border-2 border-white" title="Verified Creator">
                            <i class="fa-solid fa-check text-xs"></i>
                        </div>
                    </div>

                    <div class="text-center sm:text-left flex-grow z-10 pt-2 sm:pt-0">
                        <h1 id="creator-name" class="text-2xl sm:text-3xl font-bold text-gray-800 mb-1">...</h1>
                        <p class="text-primary font-medium text-sm flex items-center justify-center sm:justify-start gap-1 mb-3">
                            <i class="fa-solid fa-pen-nib"></i> นักเขียน Luminous
                        </p>
                        <p id="creator-bio" class="text-gray-500 text-sm max-w-2xl leading-relaxed">...</p>
                    </div>

                    <div class="flex gap-3 shrink-0 mt-4 sm:mt-0 z-10">
                        <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-2.5 px-5 rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 flex items-center gap-2">
                            <i class="fa-solid fa-share-nodes"></i> แชร์
                        </button>
                        <button onclick="Swal.fire('ติดตามสำเร็จ!', 'คุณจะได้รับการแจ้งเตือนเมื่อนักเขียนอัปเดตผลงาน', 'success')" class="bg-primary hover:bg-primary-dark text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all transform hover:-translate-y-0.5 flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> ติดตาม
                        </button>
                    </div>
                </div>
            </div>

            <div class="container mx-auto px-4 max-w-6xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-emerald-100 text-primary rounded-xl flex items-center justify-center text-xl shadow-sm">
                        <i class="fa-solid fa-book-open"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800">ผลงานทั้งหมดของนักเขียน</h2>
                    <span id="works-count" class="bg-gray-100 text-gray-500 text-xs font-bold px-2.5 py-1 rounded-full ml-auto">0 เรื่อง</span>
                </div>

                <div id="works-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                    </div>

                <div id="empty-state" class="hidden py-16 text-center bg-white rounded-3xl border border-dashed border-gray-200">
                    <div class="text-6xl text-gray-200 mb-4"><i class="fa-solid fa-box-open"></i></div>
                    <p class="text-gray-500 font-medium">นักเขียนคนนี้ยังไม่มีผลงานที่เผยแพร่</p>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="js/components/navbar.js"></script>
    <script type="module">
        import { loadNavbar } from '/js/components/navbar.js';
        document.addEventListener('DOMContentLoaded', loadNavbar);
    </script>
    <script type="module" src="js/pages/creatorProfile.js"></script>
</body>
</html>
