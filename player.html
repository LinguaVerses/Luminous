<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luminous Story - Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#10b981', 'primary-dark': '#059669' } } }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #000; color: #fff; overflow: hidden; }
        /* Player Container */
        .player-container {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 450px; /* ขนาดมือถือ */
            margin: 0 auto;
            background-color: #111;
        }
        /* Iframe ของ YouTube จะต้องอยู่เลเยอร์ล่างสุด */
        .youtube-player {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: auto; /* ป้องกันการคลิกไปโดน UI ของ YouTube */
        }
        /* UI ครอบทับวิดีโอ */
        .player-ui {
            position: absolute;
            inset: 0;
            z-index: 15;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 15px;
	    pointer-events: none;
        }

	/* แถบ Glassmorphism บังส่วนบน */
        .glass-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px; /* ปรับความสูงตามความเหมาะสม */
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%);
            backdrop-filter: blur(15px); /* ขุ่นมากเพื่อปิดข้อความ YT */
            -webkit-backdrop-filter: blur(15px);
            z-index: 5;
            pointer-events: auto; /* ป้องกันการคลิกเข้า YouTube */
        }
        /* แถบ Glassmorphism บังส่วนล่าง */
        .glass-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(4px); /* ขุ่นน้อยลงเพื่อให้ดูเคลียร์ */
            -webkit-backdrop-filter: blur(4px);
            z-index: 5;
            pointer-events: auto; /* ป้องกันการคลิกเข้า YouTube */
        }

        /* หน้าจอ Blur เมื่อติดเหรียญ */
        .unlock-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 20;
            display: none; /* ซ่อนไว้ก่อน จะแสดงผ่าน JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="player-container" id="player-container">
        <!--<iframe class="youtube-player" id="yt-player"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&controls=0&modestbranding=1&rel=0&showinfo=0&mute=1" 
            frameborder="0" allow="autoplay; encrypted-media">
        </iframe>-->

	<div class="youtube-player" id="yt-player"></div>

	<!-- แถบ Glassmorphism สำหรับบดบัง UI YouTube และป้องกันการคลิก -->
        <div class="glass-top"></div>
        <div class="glass-bottom"></div>

        <div class="player-ui">
            <div class="flex justify-between items-center drop-shadow-md">
                <a href="index.html" class="w-10 h-10 bg-black/50 rounded-full flex items-center justify-center text-white hover:bg-black/80 pointer-events-auto">
                    <i class="fa-solid fa-home"></i>
                </a>
                <div class="text-center flex-1 px-4">
                    <h1 class="text-sm font-bold truncate" id="player-title">กำลังโหลด...</h1>
                </div>
                <button id="next-ep-btn" class="w-10 h-10 bg-black/50 rounded-full flex items-center justify-center text-white hover:bg-black/80 pointer-events-auto" title="ตอนถัดไป">
                    <i class="fa-solid fa-angles-right"></i>
                </button>
            </div>

            <div class="flex justify-end items-end h-full pb-10">
                <div class="flex flex-col gap-5">
                    <button id="like-btn" class="flex flex-col items-center pointer-events-auto">
                        <div class="w-12 h-12 bg-black/40 rounded-full flex items-center justify-center mb-1">
                    
                        <i id="like-icon" class="fa-solid fa-heart text-xl transition-colors duration-300"></i>
                        </div>
                        <span id="like-count" class="text-xs font-bold shadow-black drop-shadow-lg">0</span>
                    </button>
             
                    <button id="mute-btn" class="flex flex-col items-center pointer-events-auto">
                        <div class="w-12 h-12 bg-black/40 rounded-full flex items-center justify-center mb-1">
                            <i id="mute-icon" class="fa-solid fa-volume-xmark text-xl"></i>
                        </div>
                        <span id="mute-text" class="text-xs font-bold drop-shadow-lg">เปิดเสียง</span>
                    </button>

                    <button id="toc-btn" class="flex flex-col items-center pointer-events-auto">
                        <div class="w-12 h-12 bg-black/40 rounded-full flex items-center justify-center mb-1">
                            <i class="fa-solid fa-list text-xl"></i>
                        </div>
                        <span class="text-xs font-bold drop-shadow-lg">ตอนทั้งหมด</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="unlock-overlay" id="unlock-screen">
            <i class="fa-solid fa-lock text-5xl text-gray-400 mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">หมดเวลาดูตัวอย่างฟรี</h2>
            <p class="text-gray-300 mb-6 text-sm max-w-xs">ปลดล็อกเพื่อรับชมแอนิเมชันตอนนี้แบบเต็มๆ และสนับสนุนครีเอเตอร์</p>
            
            <button id="unlock-btn" class="bg-primary hover:bg-primary-dark text-white font-bold py-3 px-8 rounded-full text-lg w-full max-w-xs mb-4 shadow-lg flex items-center justify-center gap-2 transition transform hover:scale-105">
                <i class="fa-solid fa-key"></i> ปลดล็อกด้วย 10 Keys
            </button>
            
            <p class="text-xs text-gray-400">ยอดคงเหลือ: <span id="user-balance">0</span> Keys | <a href="topup.html" class="text-emerald-400 underline">เติม Keys</a></p>

	    <a href="index.html" class="mt-8 px-4 py-2 text-sm text-gray-400 hover:text-white flex items-center gap-2 border border-gray-600 rounded-full hover:bg-gray-800 transition-all duration-300 drop-shadow-md">
                <i class="fa-solid fa-house"></i> กลับสู่หน้า Home
            </a>
        </div>
    </div>

    <script type="module" src="./js/pages/player.js"></script>
</body>
</html>
