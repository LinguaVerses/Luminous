<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการโปรไฟล์ | Luminous Story</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#10b981', 'primary-dark': '#059669' },
                    fontFamily: { sans: ['Prompt', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <div id="navbar-container"></div>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-4xl">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 bg-emerald-100 text-primary rounded-full flex items-center justify-center text-2xl shadow-sm">
                <i class="fa-solid fa-user-gear fa-bounce" style="--fa-animation-iteration-count: 2;"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800">จัดการโปรไฟล์</h1>
                <p class="text-sm text-gray-500">ปรับแต่งข้อมูลส่วนตัวและการตั้งค่าบัญชีของคุณ</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-emerald-50 overflow-hidden">
            <div class="h-32 bg-gradient-to-r from-emerald-400 to-teal-500 relative"></div>
            
            <div class="px-8 pb-8">
                <div class="relative flex justify-between items-end -mt-12 mb-8">
                    <div class="relative group">
                        <img id="profile-avatar" src="https://via.placeholder.com/150" alt="Profile" class="w-28 h-28 rounded-full border-4 border-white shadow-lg object-cover bg-white">
                        <div class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity cursor-pointer" onclick="document.getElementById('avatar-url-input').focus()">
                            <i class="fa-solid fa-camera text-white text-xl"></i>
                        </div>
                    </div>
                    <div class="bg-emerald-50 border border-emerald-100 px-5 py-2.5 rounded-2xl shadow-sm flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">ยอดกุญแจคงเหลือ</p>
                            <p id="profile-points" class="text-lg font-bold text-gray-800">0</p>
                        </div>
                        <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-key text-yellow-500 fa-beat-fade"></i>
                        </div>
                    </div>
                </div>

                <form id="profile-form" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">ชื่อผู้ใช้ (Username)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-user text-gray-400"></i>
                                </div>
                                <input type="text" id="input-username" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="ป้อนชื่อผู้ใช้ของคุณ" required>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">อีเมล (Email)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-envelope text-gray-400"></i>
                                </div>
                                <input type="email" id="input-email" class="w-full pl-11 pr-4 py-3 bg-gray-100 border border-gray-200 text-gray-500 rounded-xl outline-none cursor-not-allowed" readonly disabled>
                            </div>
                            <p class="text-[10px] text-gray-400 mt-1">* อีเมลไม่สามารถเปลี่ยนได้ เพื่อความปลอดภัยของบัญชี</p>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">สถานะบัญชี (Role)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-id-badge text-gray-400"></i>
                                </div>
                                <input type="text" id="input-role" class="w-full pl-11 pr-4 py-3 bg-gray-100 border border-gray-200 text-gray-500 rounded-xl outline-none cursor-not-allowed capitalize" readonly disabled>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">ลิงก์รูปโปรไฟล์ (URL)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-link text-gray-400"></i>
                                </div>
                                <input type="url" id="avatar-url-input" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="https://example.com/image.jpg">
                            </div>
                        </div>
                    </div>

		<div id="upgrade-invite-section" class="hidden bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 rounded-2xl p-6 mt-6">
                        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div>
                                <h3 class="text-lg font-bold text-amber-800 flex items-center gap-2"><i class="fa-solid fa-wand-magic-sparkles text-amber-500"></i> สร้างรายได้จากผลงานของคุณ!</h3>
                                <p class="text-sm text-amber-700 mt-1">อัปเกรดเป็น Creator เพื่อเริ่มต้นเขียนเรื่องราวและรับรายได้จากผู้อ่าน</p>
                            </div>
                            <a href="/guide-creator.html" class="shrink-0 px-6 py-2.5 bg-amber-500 text-white text-sm font-bold rounded-xl shadow-sm hover:bg-amber-600 hover:-translate-y-0.5 transition-all whitespace-nowrap">
                                🚀 สมัครเป็น Creator
                            </a>
                        </div>
                    </div>

                    <div id="creator-section" class="hidden border-t border-gray-100 pt-6 mt-6">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-pen-nib text-primary"></i> ข้อมูลนักเขียน (Creator Profile)
                        </h3>
                        <div class="grid grid-cols-1 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">นามปากกา (Pen Name)</label>
                                <input type="text" id="input-penname" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="นามปากกาของคุณ">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-2">ประวัติย่อ (Bio)</label>
                                <textarea id="input-bio" rows="3" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all resize-none" placeholder="แนะนำตัวสั้นๆ ให้นักอ่านรู้จักคุณมากขึ้น..."></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-gray-100 pt-8 mt-4">                       
                        <button type="submit" id="btn-save-profile" class="w-full sm:w-auto px-8 py-3 bg-primary text-white font-bold rounded-xl shadow-md hover:bg-primary-dark hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-floppy-disk"></i> บันทึกการเปลี่ยนแปลง
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script type="module" src="/js/components/navbar.js"></script>
    <script type="module">
        import { loadNavbar } from '/js/components/navbar.js';
        document.addEventListener('DOMContentLoaded', loadNavbar);
    </script>
    <script type="module" src="/js/pages/profile.js"></script>
</body>
</html>
